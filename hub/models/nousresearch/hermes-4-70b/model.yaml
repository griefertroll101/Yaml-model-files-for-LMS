metadataOverrides:
  domain: llm
  architectures:
    - llama
  compatibilityTypes:
    - gguf
  paramsStrings:
    - 70B
  minMemoryUsageBytes: 39835821670
  contextLengths:
    - 131072
  vision: false
  reasoning: true
  trainedForToolUse: true
config:
  operation:
    fields:
      - key: llm.prediction.temperature
        value: 0.6
      - key: llm.prediction.topKSampling
        value: 20
      - key: llm.prediction.topPSampling
        value:
          checked: true
          value: 0.95
customFields:
  - key: enableThinking
    displayName: Enable Thinking
    description: Controls whether the model will think before replying
    type: boolean
    defaultValue: false
    effects:
      - type: setJinjaVariable
        variable: thinking
  - key: keepCots
    displayName: Keep CoT
    description: Include Chain of Thought in subsequent requests
    type: boolean
    defaultValue: false
    effects:
      - type: setJinjaVariable
        variable: keep_cots
