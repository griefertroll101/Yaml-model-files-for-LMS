metadataOverrides:
  domain: llm
  architectures:
    - llama
  compatibilityTypes:
    - gguf
  paramsStrings:
    - 405B
  minMemoryUsageBytes: 39835821670
  contextLengths:
    - 131072
  vision: false
  reasoning: true
  trainedForToolUse: true
config:
  operation:
    fields:
      - key: llm.prediction.temperature
        value: 0.6
      - key: llm.prediction.topKSampling
        value: 20
