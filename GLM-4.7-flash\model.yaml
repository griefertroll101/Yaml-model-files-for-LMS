config:
  operation:
    fields:
      - key: llm.prediction.temperature
        value: 0.2
      - key: llm.prediction.topKSampling
        value: 50
      - key: llm.prediction.topPSampling
        value:
          checked: true
          value: 0.95
      - key: llm.prediction.repeatPenalty
        value:
          checked: false
          value: 0
customFields:
  - key: enableThinking
    displayName: Enable Thinking
    description: Controls whether the model will think before replying
    type: boolean
    defaultValue: true
    effects:
      - type: setJinjaVariable
        variable: enable_thinking
  - key: clearThinking
    displayName: Clear Thinking
    description: Controls whether thinking content is cleared from history
    type: boolean
    defaultValue: false
    effects:
      - type: setJinjaVariable
        variable: clear_thinking
metadataOverrides:
  domain: llm
  architectures:
    - glm4_moe_lite
  compatibilityTypes:
    - gguf
    - safetensors
  paramsStrings:
    - 30B
  minMemoryUsageBytes: 16000000000
  contextLengths:
    - 131072
  vision: false
  reasoning: true
  trainedForToolUse: true
