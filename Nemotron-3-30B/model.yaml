config:
  operation:
    fields:
      - key: llm.prediction.repeatPenalty
        value:
          checked: true
          value: 1.0
customFields:
  - key: enableThinking
    displayName: Enable Thinking
    description: Controls whether the model will think before replying
    type: boolean
    defaultValue: true
    effects:
      - type: setJinjaVariable
        variable: enable_thinking
  - key: truncateThinkingHistory
    displayName: Truncate Thinking History
    description: Controls whether thinking history will be truncated to save context space
    type: boolean
    defaultValue: false
    effects:
      - type: setJinjaVariable
        variable: truncate_history_thinking
metadataOverrides:
  domain: llm
  architectures:
    - nemotron_h_moe
  compatibilityTypes:
    - gguf
    - safetensors
  paramsStrings:
    - 30B
  minMemoryUsageBytes: 24620000000
  contextLengths:
    - 1048576
  vision: false
  reasoning: true
  trainedForToolUse: true
